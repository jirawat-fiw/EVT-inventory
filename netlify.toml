# Netlify config — EVT ระบบเบิกของ
# เว็บเป็น static (React + Babel ผ่าน CDN) ไม่ต้อง build
# เสิร์ฟไฟล์จากโฟลเดอร์ web/ (มี index.html อยู่)
[build]
  publish = "web"
  command = ""

# Netlify Functions (สแกน PR ด้วย Claude วิชัน) — เรียกที่ /.netlify/functions/extract-pr
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
